# Redirect HTTP → HTTPS, www → non-www
server {
    listen 80;
    server_name vmst.com.vn www.vmst.com.vn;
    return 301 https://vmst.com.vn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.vmst.com.vn;

    ssl_certificate /etc/letsencrypt/live/vmst.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vmst.com.vn/privkey.pem;

    return 301 https://vmst.com.vn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vmst.com.vn;

    ssl_certificate /etc/letsencrypt/live/vmst.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vmst.com.vn/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Next.js static files (cached forever)
    location /_next/static/ {
        alias /var/www/vmst-nextjs/.next/static/;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public files
    location /image/ {
        alias /var/www/vmst-nextjs/public/image/;
        expires 30d;
        access_log off;
    }

    location /assets/ {
        alias /var/www/vmst-nextjs/public/assets/;
        expires 30d;
        access_log off;
    }

    location = /favicon.png {
        root /var/www/vmst-nextjs/public/image;
        try_files /favicon.png =404;
        access_log off;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }
}
